<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LinkX Weather Station</title>
<style>
  :root{--bg:#0d1117; --card:#161b22; --accent:#00c9a7; --accent2:#ff4d4d; --cold:#3d8bfd; --warn:#f5a623;
        --text:#e6edf3; --muted:#8b949e; --border:#2d333b;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',Roboto,sans-serif; padding:14px 14px 40px; user-select:none;}
  h1{font-size:1.25rem; margin:6px 0 2px;}
  .sub{color:var(--muted); font-size:.8rem; margin-bottom:14px;}
  .status-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--muted);transition:.3s;}
  .dot.on{background:var(--accent); box-shadow:0 0 8px var(--accent);}
  .dot.err{background:var(--accent2); box-shadow:0 0 8px var(--accent2);}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:14px;}
  .card h2{font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 10px;}
  .reading-row{display:flex; gap:14px;}
  .reading-box{flex:1; text-align:center; background:#21262d; border-radius:12px; padding:16px 0; border:1px solid var(--border);}
  .reading-box .label{font-size:.75rem; color:var(--muted); margin-bottom:4px;}
  .reading-box .val{font-size:1.8rem; font-weight:700;}
  canvas{width:100%; height:160px; display:block;}
  .legend{display:flex; gap:14px; font-size:.78rem; color:var(--muted); margin-top:6px;}
  .legend span::before{content:"●"; margin-right:4px;}
  .legend .t::before{color:var(--accent2);}
  .legend .h::before{color:var(--cold);}
  a.dl{color:var(--accent); font-size:.8rem; text-decoration:none;}
  .log{max-height:120px; overflow-y:auto; font-size:.78rem; color:var(--muted); font-family:monospace; margin-top:10px;}
  .log div{padding:3px 0; border-bottom:1px dashed var(--border);}
</style>
</head>
<body>

<h1>🌡️ LinkX Weather Station</h1>
<div class="sub">DHT22 Live Temperature &amp; Humidity · ESP32-S3</div>

<div class="status-row">
  <div id="wsDot" class="dot"></div><span id="wsText">Connecting…</span>
</div>

<div class="card">
  <h2>Live Readings</h2>
  <div class="reading-row">
    <div class="reading-box"><div class="label">TEMPERATURE</div><div id="tempVal" class="val">--°C</div></div>
    <div class="reading-box"><div class="label">HUMIDITY</div><div id="humVal" class="val">--%</div></div>
  </div>
</div>

<div class="card">
  <h2>Trend (last ~5 min)</h2>
  <canvas id="chart" width="600" height="320"></canvas>
  <div class="legend"><span class="t">Temperature</span><span class="h">Humidity</span></div>
</div>

<div class="card">
  <h2>Data Log <a class="dl" href="/weather_log.csv" download>Download CSV</a></h2>
  <p style="color:var(--muted); font-size:.78rem; margin:0 0 8px;">A reading is appended to the log every 5 minutes.</p>
  <div id="logBox" class="log"><div>Waiting for events…</div></div>
</div>

<script>
let ws;
const tempHistory = [], humHistory = [];
const MAX_POINTS = 60;

function connect(){
  ws = new WebSocket('ws://' + location.hostname + '/ws');
  ws.onopen = () => setDot('on','Connected');
  ws.onclose = () => { setDot('','Disconnected — retrying'); setTimeout(connect,1500); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try{
      const d = JSON.parse(e.data);
      if(d.error){
        setDot('err','Sensor error');
        return;
      }
      if(d.temp !== undefined){
        document.getElementById('tempVal').textContent = d.temp.toFixed(1) + '°C';
        document.getElementById('humVal').textContent = d.hum.toFixed(0) + '%';
        pushPoint(d.temp, d.hum);
        setDot('on','Connected');
      }
      if(d.event) addLog(d.event);
    }catch(err){}
  };
}
function setDot(cls,text){
  document.getElementById('wsDot').className = 'dot'+(cls?' '+cls:'');
  document.getElementById('wsText').textContent = text;
}
function pushPoint(t,h){
  tempHistory.push(t); humHistory.push(h);
  if(tempHistory.length > MAX_POINTS) tempHistory.shift();
  if(humHistory.length > MAX_POINTS) humHistory.shift();
  drawChart();
}
function drawChart(){
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  function drawLine(data, min, max, color){
    if(data.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    data.forEach((v,i)=>{
      const x = (i/(MAX_POINTS-1)) * w;
      const y = h - ((v-min)/(max-min || 1)) * (h-20) - 10;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  // gridlines
  ctx.strokeStyle = '#2d333b';
  ctx.lineWidth = 1;
  for(let i=0;i<=4;i++){
    const y = (h/4)*i;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  drawLine(tempHistory, 0, 50, '#ff4d4d');
  drawLine(humHistory, 0, 100, '#3d8bfd');
}
function addLog(text){
  const box = document.getElementById('logBox');
  if(box.children[0] && box.children[0].textContent === 'Waiting for events…') box.innerHTML='';
  const line = document.createElement('div'); line.textContent = text;
  box.prepend(line);
  while(box.children.length > 30) box.removeChild(box.lastChild);
}
connect();
</script>
</body>
</html>
